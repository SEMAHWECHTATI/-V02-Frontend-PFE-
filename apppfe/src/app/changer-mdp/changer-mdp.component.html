<div class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg border-0 rounded-4 p-4" style="width: 100%; max-width: 450px;">
    
    <div class="text-center mb-4">
      <h3 class="text-primary fw-bold">
        <i class="bi bi-shield-lock me-2"></i>Nouveau mot de passe
      </h3>
      <p class="text-muted">Veuillez définir votre nouveau mot de passe.</p>
    </div>

    <div *ngIf="erreur" class="alert alert-danger p-2 d-flex align-items-center rounded-3">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      <div>{{ erreur }}</div>
    </div>

    <form (ngSubmit)="changerMotDePasse()">
      
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Adresse Email</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" id="email" class="form-control" name="email"
                 [(ngModel)]="email" placeholder="nom@sagem.com" required>
        </div>
      </div>

      <hr class="my-4 text-muted">

      <div class="mb-3">
        <label for="nouveauMotDePasse" class="form-label fw-semibold">Nouveau mot de passe</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" id="nouveauMotDePasse" class="form-control" name="nouveauMotDePasse"
                 [(ngModel)]="nouveauMotDePasse" placeholder="Saisissez le nouveau mot de passe" required>
        </div>
      </div>

      <div class="mb-4">
        <label for="confirmerMotDePasse" class="form-label fw-semibold">Confirmer le mot de passe</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock-fill text-muted"></i></span>
          <input type="password" id="confirmerMotDePasse" class="form-control" name="confirmerMotDePasse"
                 [(ngModel)]="confirmerMotDePasse" placeholder="Retapez le mot de passe" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold rounded-3" [disabled]="chargement">
        <span *ngIf="chargement" class="spinner-border spinner-border-sm me-2" role="status"></span>
        {{ chargement ? 'Mise à jour en cours...' : 'Changer mon mot de passe' }}
      </button>

    </form>

  </div>
</div>
