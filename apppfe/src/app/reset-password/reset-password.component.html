<div class="reset-wrapper">
  <div class="reset-card">

    <h2 class="reset-title">Créer un nouveau mot de passe</h2>
    <p class="reset-subtitle">
      Veuillez saisir votre nouveau mot de passe pour sécuriser votre compte.
    </p>

    <form (ngSubmit)="onSubmit()" #form="ngForm">

      <div class="mb-4">
        <label for="nouveauMotDePasse" class="form-label">
          Nouveau mot de passe
        </label>

        <div class="input-box">
          <i class="bi bi-lock-fill"></i>
          <input
            type="password"
            class="form-control"
            id="nouveauMotDePasse"
            name="nouveauMotDePasse"
            [(ngModel)]="nouveauMotDePasse"
            #passwordCtrl="ngModel"
            required
            minlength="6"
            placeholder="********">
        </div>

        <div class="error-message"
             *ngIf="passwordCtrl.invalid && passwordCtrl.touched">

          <span *ngIf="passwordCtrl.errors?.['required']">
            Le mot de passe est obligatoire.
          </span>

          <span *ngIf="passwordCtrl.errors?.['minlength']">
            Le mot de passe doit contenir au moins 6 caractères.
          </span>

        </div>
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="!form.valid">
        <i class="bi bi-check-circle me-2"></i>
        Valider le nouveau mot de passe
      </button>

    </form>

    <div class="alert alert-success mt-4" *ngIf="message">
      <i class="bi bi-check-circle-fill me-2"></i>
      {{ message }}
      <br>
      Redirection en cours...
    </div>

    <div class="alert alert-danger mt-4" *ngIf="erreur">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>
      {{ erreur }}
    </div>

  </div>
</div>
