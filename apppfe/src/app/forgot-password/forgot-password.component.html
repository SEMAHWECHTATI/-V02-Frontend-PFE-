<div class="container mt-5">
  <h2>Mot de passe oublié ?</h2>
  <p>Entrez votre adresse email pour recevoir un lien de réinitialisation.</p>

  <form (ngSubmit)="onSubmit()" #form="ngForm">
    <div class="form-group mb-3">
      <label for="email">Adresse Email</label>
      <input type="email" class="form-control" id="email" [(ngModel)]="email" name="email" required>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="!form.valid || enChargement">
      {{ enChargement ? 'Envoi en cours...' : 'Envoyer le lien' }}
    </button>
  </form>

  <div class="alert alert-success mt-3" *ngIf="message">{{ message }}</div>
  <div class="alert alert-danger mt-3" *ngIf="erreur">{{ erreur }}</div>
</div>
